name: spendiq
description: A modern expense tracking app with analytics
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  sqflite: ^2.4.2
  path: ^1.9.0
  fl_chart: ^0.66.2
  provider: ^6.1.2
  intl: ^0.19.0
  shared_preferences: ^2.5.4
  path_provider: ^2.1.5
  excel: ^4.0.6
  pdf: ^3.11.3
  printing: ^5.14.2
  open_filex: ^4.7.0
  image_picker: ^1.2.1
  local_auth: ^3.0.0
  flutter_native_splash: ^2.4.4
  image_cropper: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.png

  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: assets/icon/app_icon.png


flutter_native_splash:
  color: "#0D0D0D"
  image: assets/icon/app_icon.png
  android: true
  ios: false
